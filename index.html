<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes AI · Chat</title>
  <style>
    :root {
      --ink: #0f1c22;
      --paper: #fff7e8;
      --gold: #f4d9a0;
      --cyan: #a8e6e6;
      --red: #e06060;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: var(--ink);
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      overflow: hidden;
    }
    /* ── Login Overlay ── */
    #login {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(168,230,230,0.10), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(244,217,160,0.08), transparent 30%),
        var(--ink);
      transition: opacity 0.6s, visibility 0.6s;
    }
    #login.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #login h1 {
      font-size: 2.5rem; font-weight: 400;
      color: var(--paper);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    #login .tagline {
      color: var(--cyan);
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      margin-bottom: 36px;
    }
    #login .field {
      width: 280px; margin-bottom: 16px;
    }
    #login label {
      display: block;
      color: var(--gold);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    #login input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(244,217,160,0.35);
      color: var(--paper);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    #login input:focus {
      border-color: var(--cyan);
    }
    #login button {
      width: 280px;
      margin-top: 10px;
      padding: 13px 0;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-size: 1rem;
      font-family: inherit;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.2s;
    }
    #login button:hover {
      background: var(--gold);
      color: var(--ink);
    }
    #login .error {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }
    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--ink);
      transition: opacity 0.5s;
    }
    #loading h1 {
      font-size: 2.5rem; font-weight: 400;
      color: var(--paper);
      margin-bottom: 8px;
    }
    #loading p {
      color: var(--cyan); font-size: 1.1rem;
      margin-bottom: 24px;
    }
    /* ── iframe ── */
    #frame {
      width: 100%; height: 100%;
      border: none; display: block;
      opacity: 0; transition: opacity 0.5s;
    }
    #frame.loaded { opacity: 1; }
    #loading.done { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <!-- ──── LOGIN ──── -->
  <div id="login">
    <h1>Hermes AI</h1>
    <p class="tagline">PRIVATE ACCESS</p>
    <div class="field">
      <label for="user">Username</label>
      <input id="user" type="text" autocomplete="username" autofocus />
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input id="pass" type="password" autocomplete="current-password" />
    </div>
    <button id="login-btn">Enter</button>
    <p class="error" id="login-error"></p>
  </div>

  <!-- ──── CHAT ──── -->
  <div id="loading">
    <h1>Hermes AI</h1>
    <p>Connecting to your private AI…</p>
  </div>
  <div id="reconnect" style="display:none; position:fixed; inset:0; z-index:15;
    background:var(--ink); flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:var(--paper); font-weight:400; margin-bottom:8px;">Hermes AI</h1>
    <p style="color:var(--cyan); margin-bottom:4px;">Connection lost</p>
    <p id="reconnect-status" style="color:var(--gold); font-size:0.9rem;">Reconnecting…</p>
  </div>
  <iframe id="frame" src="" allow="clipboard-read; clipboard-write"></iframe>

  <script>
    // ── Auth ──
    const USERS = {
      "lea":        "86d416ae94f2970b97dda50b12085e1fb01d1bda8c2752b322801c6daf2bd7f3",
      "kanghelyu":  "590cd908a393db3cda7892d1c063c7a398a95cd5f6a2f753149503dda9de1217"
    };

    async function sha256(msg) {
      const buf = new TextEncoder().encode(msg);
      const hash = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    document.getElementById("login-btn").addEventListener("click", async () => {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value;
      const err  = document.getElementById("login-error");

      if (!user || !pass) {
        err.textContent = "Enter both username and password.";
        return;
      }

      const hash = await sha256(user + ":" + pass);
      if (USERS[user.toLowerCase()] === hash) {
        sessionStorage.setItem("hermes_auth", "1");
        document.getElementById("login").classList.add("hidden");
        startChat();
      } else {
        err.textContent = "Invalid username or password.";
        document.getElementById("pass").value = "";
      }
    });

    document.getElementById("pass").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });

    // Skip login if already authenticated this session
    if (sessionStorage.getItem("hermes_auth") === "1") {
      document.getElementById("login").classList.add("hidden");
      startChat();
    }

    // ── Chat with auto-retry ──
    const TUNNEL = "wellness-gay-browsers-balance.trycloudflare.com";
    const URL = "https://" + TUNNEL;
    let retryCount = 0;
    let healthTimer = null;

    function startChat() {
      const frame = document.getElementById("frame");
      const loading = document.getElementById("loading");
      const reconnect = document.getElementById("reconnect");
      const statusEl = document.getElementById("reconnect-status");

      function loadFrame() {
        frame.src = URL;
      }

      frame.onload = () => {
        frame.classList.add("loaded");
        loading.classList.add("done");
        reconnect.style.display = "none";
        retryCount = 0;
        setTimeout(() => { loading.style.display = "none"; }, 600);
        startHealthCheck();
      };

      // Detect iframe navigation failure
      frame.onerror = () => handleDisconnect();

      // Health check: periodic HEAD to tunnel
      function startHealthCheck() {
        if (healthTimer) clearInterval(healthTimer);
        healthTimer = setInterval(async () => {
          try {
            const resp = await fetch(URL + "/", { method: "HEAD", mode: "no-cors", cache: "no-store" });
          } catch (e) {
            handleDisconnect();
          }
        }, 30000);
      }

      function handleDisconnect() {
        if (healthTimer) { clearInterval(healthTimer); healthTimer = null; }
        frame.classList.remove("loaded");
        reconnect.style.display = "flex";
        loading.style.display = "none";
        retry();
      }

      async function retry() {
        const delay = Math.min(2000 * Math.pow(2, retryCount), 15000);
        statusEl.textContent = "Reconnecting" + ".".repeat((retryCount % 3) + 1);
        retryCount++;

        await new Promise(r => setTimeout(r, delay));

        // Try to reach tunnel
        try {
          const resp = await fetch(URL + "/", { method: "HEAD", mode: "no-cors", cache: "no-store" });
          statusEl.textContent = "Tunnel reachable, loading…";
          loadFrame();
        } catch (e) {
          statusEl.textContent = "Retry " + retryCount + "…";
          retry();
        }
      }

      loadFrame();

      setTimeout(() => {
        if (!frame.classList.contains("loaded")) {
          loading.querySelector("p").textContent = "Taking longer than expected…";
        }
      }, 5000);
    }
  </script>
</body>
</html>
